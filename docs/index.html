<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Runs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f7;
      --card: #ffffff;
      --accent: #111111;
      --text: #111111;
      --muted: #999999;
      --border: #e8e8e8;
      --pill-bg: #f0f0f0;
      --hr-color: #c0392b;
    }

    body {
      font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--accent);
      color: #fff;
      padding: 1.25rem 1rem 1rem;
      text-align: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { font-size: 0.85rem; opacity: 0.55; margin-top: 0.2rem; font-weight: 400; }

    .summary-section {
      max-width: 640px;
      margin: 0 auto;
      padding: 0.75rem 1rem 0;
    }
    .pb-grid {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 0;
      flex-wrap: wrap;
    }
    .pb-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      flex: 1 1 140px;
    }
    .pb-card .pb-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; margin-bottom: 0.35rem; }
    .pb-card .pb-value { font-size: 1.25rem; font-weight: 700; color: var(--accent); }
    .pb-card .pb-pace  { font-size: 0.82rem; color: var(--muted); margin-top: 0.1rem; }
    .pb-card .pb-date  { font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem; }
    .summary {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 0;
      justify-content: center;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1.25rem;
      text-align: center;
      flex: 1 1 120px;
      max-width: 160px;
    }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .stat-card .label { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }

    .run-list {
      padding: 0 1rem 2rem;
      max-width: 640px;
      margin: 0 auto;
    }

    .month-group { margin-bottom: 1.75rem; }
    .month-header {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      font-weight: 600;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }

    .run-row {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      margin-bottom: 0.65rem;
    }
    .run-cal {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      min-width: 46px;
      flex-shrink: 0;
    }
    .cal-day {
      background: var(--accent);
      color: #fff;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 100%;
      text-align: center;
      padding: 0.22rem 0;
    }
    .cal-num {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      padding: 0.35rem 0.4rem;
    }

    .run-card {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1rem;
    }
    .run-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .run-name   { font-size: 0.95rem; font-weight: 600; }
    .run-stats  { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .pill {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--pill-bg);
      border-radius: 20px;
      padding: 0.25rem 0.65rem;
      font-size: 0.82rem;
      font-weight: 500;
    }
    .pill.hr { color: var(--hr-color); }
    .pill svg { width: 13px; height: 13px; flex-shrink: 0; }

    .empty, .error {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .error { color: #c0392b; }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    @media (min-width: 480px) {
      header h1 { font-size: 1.8rem; }
      .run-list  { padding: 0 1.5rem 2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>My Runs</h1>
  <p id="updated-label">Loading…</p>
</header>

<div class="summary-section" id="pb-section" style="display:none">
  <h2 class="month-header">Personal Bests</h2>
  <div class="pb-grid" id="personal-bests"></div>
</div>

<div class="summary-section">
  <h2 class="month-header">Last 30 Runs</h2>
  <div class="summary" id="summary"></div>
</div>

<div class="run-list">
  <div id="runs"></div>
</div>

<footer>Data from Garmin Connect &bull; updates daily at 09:35 UTC</footer>

<script>
  // Icons (inline SVG paths)
  const icons = {
    distance: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6l9-3 9 3M3 18l9 3 9-3"/></svg>`,
    pace:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    duration: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`,
    heart:     `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21C12 21 3 13.5 3 8a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 5.5-9 13-9 13z"/></svg>`,
    elev_up:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
    elev_down: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>`,
  };

  function getDateParts(iso) {
    if (!iso) return { dayName: "", dayNum: "", monthYear: "", monthKey: "" };
    const d = new Date(iso + "T00:00:00");
    return {
      dayName: d.toLocaleDateString("en-GB", { weekday: "short" }).toUpperCase(),
      dayNum:  d.getDate(),
      monthYear: d.toLocaleDateString("en-GB", { month: "long", year: "numeric" }),
      monthKey:  `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`,
    };
  }

  function pill(icon, text, extraClass = "") {
    return `<span class="pill ${extraClass}">${icons[icon]}${text}</span>`;
  }

  function formatPbDate(iso) {
    if (!iso) return "";
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
  }

  function renderPersonalBests(pbs) {
    if (!pbs) return;
    const cards = ["5k", "10k", "longest_run"];
    const labels = { "5k": "5K", "10k": "10K", "longest_run": "Longest Run" };
    const html = cards
      .filter(k => pbs[k])
      .map(k => {
        const p = pbs[k];
        const value = k === "longest_run" ? `${p.distance_km} km` : p.time;
        return `<div class="pb-card">
          <div class="pb-label">${labels[k]}</div>
          <div class="pb-value">${value || "—"}</div>
          ${p.pace ? `<div class="pb-pace">${p.pace}</div>` : ""}
          ${p.date ? `<div class="pb-date">${formatPbDate(p.date)}</div>` : ""}
        </div>`;
      })
      .join("");
    if (html) {
      document.getElementById("personal-bests").innerHTML = html;
      document.getElementById("pb-section").style.display = "";
    }
  }

  fetch("data.json")
    .then(r => { if (!r.ok) throw new Error("not found"); return r.json(); })
    .then(data => {
      const runs = data.runs || [];

      renderPersonalBests(data.personal_bests);

      // Updated timestamp
      if (data.updated) {
        const d = new Date(data.updated);
        document.getElementById("updated-label").textContent =
          "Updated " + d.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });
      } else {
        document.getElementById("updated-label").textContent = "";
      }

      // Summary stats
      const totalRuns = runs.length;
      const totalKm   = runs.reduce((s, r) => s + (r.distance_km || 0), 0);
      const parseDur  = d => { if (!d) return 0; const p = d.split(":").map(Number); return p.length === 3 ? p[0]*3600+p[1]*60+p[2] : p[0]*60+p[1]; };
      const totalSecs = runs.reduce((s, r) => s + parseDur(r.duration), 0);
      const totalH    = Math.floor(totalSecs / 3600);
      const totalM    = Math.floor((totalSecs % 3600) / 60);
      const totalTime = totalH > 0 ? `${totalH}h ${totalM}m` : `${totalM}m`;

      document.getElementById("summary").innerHTML = `
        <div class="stat-card"><div class="value">${totalKm.toFixed(1)}</div><div class="label">Total km</div></div>
        <div class="stat-card"><div class="value">${totalTime}</div><div class="label">Total time</div></div>
      `;

      // Run cards
      if (runs.length === 0) {
        document.getElementById("runs").innerHTML = `<div class="empty">No runs found yet.</div>`;
        return;
      }

      const grouped = {};
      runs.forEach(r => {
        const { monthKey, monthYear } = getDateParts(r.date);
        if (!grouped[monthKey]) grouped[monthKey] = { label: monthYear, runs: [] };
        grouped[monthKey].runs.push(r);
      });

      let html = "";
      Object.keys(grouped).sort((a, b) => b.localeCompare(a)).forEach(key => {
        const { label, runs: monthRuns } = grouped[key];
        html += `<div class="month-group"><h2 class="month-header">${label}</h2>`;
        monthRuns.forEach(r => {
          const { dayName, dayNum } = getDateParts(r.date);
          html += `
            <div class="run-row">
              <div class="run-cal">
                <span class="cal-day">${dayName}</span>
                <span class="cal-num">${dayNum}</span>
              </div>
              <div class="run-card">
                <div class="run-header">
                  <span class="run-name">${r.name}</span>
                </div>
                <div class="run-stats">
                  ${pill("distance", `${r.distance_km} km`)}
                  ${pill("duration", r.duration)}
                  ${pill("pace", r.pace)}
                  ${r.avg_hr ? pill("heart", `${r.avg_hr} bpm`, "hr") : ""}
                </div>
                ${(r.elevation_gain != null || r.elevation_loss != null) ? `<div class="run-stats" style="margin-top:0.35rem">
                  ${r.elevation_gain != null ? pill("elev_up", `${r.elevation_gain}m`) : ""}
                  ${r.elevation_loss != null ? pill("elev_down", `${r.elevation_loss}m`) : ""}
                </div>` : ""}
              </div>
            </div>`;
        });
        html += `</div>`;
      });
      document.getElementById("runs").innerHTML = html;

    })
    .catch(() => {
      document.getElementById("updated-label").textContent = "";
      document.getElementById("runs").innerHTML =
        `<div class="error">Could not load run data. Make sure the GitHub Action has run at least once.</div>`;
    });
</script>
</body>
</html>
